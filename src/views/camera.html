<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Detector</title>
  <link rel="stylesheet" href="/styles/global.css">
</head>
<body>

  <div class="camera-app">
    <div class="app-brand logo-only">
      <img class="brand-logo small" src="/public/logo-huebly.svg" alt="Huebly logo">
    </div>
    <a class="back-link" href="./profile.html">← Back to Profile</a>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="swatch"></div>
    <div id="color-name">Waiting...</div>
    <div id="color-meta"></div>
    <div id="status"></div>

    <button id="freezeBtn" type="button">Freeze</button>
  </div>

  <div id="chatOverlay" class="hidden"></div>
  <button id="goChat" type="button" class="chat-toggle">Chat</button>

  <script src="../shared/ntc.js"></script>
  <script type="module">
    import { initCamera } from "../controllers/cameraController.js"
    initCamera()
  </script>
</body>
</html>
