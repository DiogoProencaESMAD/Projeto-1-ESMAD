<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz</title>
  <link rel="stylesheet" href="/styles/global.css">
</head>
<body>

  <div class="quiz-box">
    <div class="app-brand logo-only">
      <img class="brand-logo small" src="/public/logo-huebly.svg" alt="Huebly logo">
    </div>
    <a class="back-link" href="./profile.html">← Back to Profile</a>

    <div id="question" class="question">Loading...</div>
    <div id="answers" class="answers"></div>
    <div id="result"></div>
    <button id="nextBtn" type="button">Next</button>
  </div>

  <div id="chatOverlay" class="hidden"></div>
  <button id="goChat" type="button" class="chat-toggle">Chat</button>

  <script type="module">
    import { initQuiz } from "../controllers/quizController.js"
    initQuiz()
  </script>
</body>
</html>
