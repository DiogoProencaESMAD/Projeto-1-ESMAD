<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile</title>
</head>

<body>
  <h1>Profile</h1>

  <div id="userInfo"></div>

  <hr />

  <button id="goCamera">Camera</button>
  <button id="goQuiz">Quiz</button>
  <button id="goChat">Chat</button>
  <button id="goAchievements">Achievements</button>

  <!-- CHAT OVERLAY (GLOBAL UI ELEMENT) -->
  <div id="chatOverlay" class="hidden">
    <div id="chatMessages" style="height:200px; overflow:auto; border:1px solid #ccc;"></div>

    <input id="chatInput" placeholder="Message..." />
    <button id="sendChat">Send</button>

    <button id="closeChat">Close</button>
  </div>

  <script type="module">
    import { initProfile } from "../controllers/profileController.js"
    import { initChat } from "../controllers/chatController.js"

    initProfile()
    initChat()
  </script>
</body>
</html>
