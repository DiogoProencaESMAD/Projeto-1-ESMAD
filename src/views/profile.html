<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile</title>
  <link rel="stylesheet" href="/styles/global.css">
  <style>
    .page-container {
      position: relative;
    }

    #settingsBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      background: var(--secondary-bg);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      width: auto;
      color: var(--text-color);
    }

    #settingsModal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--overlay-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .settings-content {
      background: var(--surface-bg);
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .settings-content h3 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .settings-option {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .settings-option:last-child {
      border-bottom: none;
    }

    .settings-option > button {
      width: 100%;
      padding: 10px;
      background: var(--primary-color);
      color: var(--primary-text);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .settings-option button:hover {
      background: var(--primary-hover);
    }

    .settings-row {
      display: grid;
      gap: 8px;
    }

    .settings-avatar-preview {
      width: 80px;
      height: 80px;
      margin: 4px auto 0;
      font-size: 26px;
    }

    .settings-helper-link {
      font-size: 14px;
    }

    #closeSettingsBtn {
      float: right;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      width: auto;
      color: var(--text-color);
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="app-brand logo-only">
      <img class="brand-logo small" src="/public/logo-huebly.svg" alt="Huebly logo">
    </div>
    <button id="settingsBtn" type="button">⚙️ Settings</button>
    <h1 class="page-title">Profile</h1>
    <div id="userInfo"></div>
    <hr />
    <button id="goCamera" type="button">Camera</button>
    <button id="goQuiz" type="button">Quiz</button>
    <button id="goChat" type="button">Chat</button>
    <button id="goAchievements" type="button">Achievements</button>
    <button id="logoutBtn" type="button" class="link-button">Logout</button>
  </div>

  <div id="chatOverlay" class="hidden"></div>

  <div id="settingsModal" class="hidden">
    <div class="settings-content">
      <button id="closeSettingsBtn" type="button">✕</button>
      <h3>Settings</h3>
      <div class="settings-option">
        <label class="settings-label">Color Scheme</label>
        <div class="settings-row compact-row">
          <select id="colorSchemeSelect"></select>
          <button type="button" id="saveColorSchemeBtn">Change scheme</button>
        </div>
      </div>
      <div class="settings-option">
        <label class="settings-label">Display Mode</label>
        <div class="settings-row compact-row">
          <select id="displayModeSelect"></select>
          <button type="button" id="saveDisplayModeBtn">Change mode</button>
        </div>
        <p class="inline-note">This only changes light or dark surfaces and keeps the accessibility color scheme intact.</p>
      </div>
      <div class="settings-option">
        <button type="button" id="changePasswordBtn">Change Password</button>
      </div>
      <div class="settings-option">
        <button type="button" id="changeUsernameBtn">Change Username</button>
      </div>
      <div class="settings-option">
        <label class="settings-label" for="profileImageSelect">Profile picture</label>
        <div class="settings-row">
          <select id="profileImageSelect"></select>
          <div id="profileImagePreview" class="profile-avatar settings-avatar-preview" aria-hidden="true"></div>
          <button type="button" id="saveProfileImageBtn">Save picture</button>
        </div>
        <p class="inline-note">Choose one of the preset avatars.</p>
      </div>
      <div class="settings-option">
        <a class="settings-helper-link" href="./onboarding/select-daltonism.html">Change vision type</a>
        <p class="inline-note">Changing vision type switches the color scheme back to auto.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initProfile } from "../controllers/profileController.js"
    initProfile()
  </script>
</body>
</html>
